[build]
  command = "npx expo export --platform web"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# 短路径别名，便于 EXPO_PUBLIC_CHAT_PROXY_URL 填 https://站点/api/chat
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/dashscope-proxy"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
